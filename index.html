<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>항공정비사 구술 플래시카드 | AME Quiz</title>
<meta name="description" content="항공정비사(AME) 자격증 구술시험 대비 플래시카드. ATA 챕터별 1230문항으로 효과적으로 준비하세요.">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#eeede8;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9a9a9a;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --info-bg:#e6f1fb;--info-text:#0c447c;
  --success-bg:#eaf3de;--success-text:#3b6d11;
  --danger-bg:#fcebeb;--danger-text:#a32d2d;
  --warning-bg:#faeeda;--warning-text:#854f0b;
  --radius:8px;--radius-lg:12px;--green:#1D9E75;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1b;--bg2:#262625;--bg3:#2e2e2c;
    --text:#f0efea;--text2:#a8a8a0;--text3:#6a6a62;
    --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
    --info-bg:#042c53;--info-text:#85b7eb;
    --success-bg:#173404;--success-text:#97c459;
    --danger-bg:#501313;--danger-text:#f09595;
    --warning-bg:#412402;--warning-text:#ef9f27;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;line-height:1.6;}
header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-size:16px;font-weight:500;color:var(--text);}
.logo span{color:var(--green);}
.active-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--success-bg);color:var(--success-text);font-weight:500;}
.header-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--info-bg);color:var(--info-text);font-weight:500;}
.page{max-width:1000px;margin:0 auto;padding:16px;display:grid;grid-template-columns:minmax(0,1fr) 180px;gap:14px;align-items:start;}
@media(max-width:680px){.page{grid-template-columns:minmax(0,1fr);}.sidebar{display:none;}.mobile-ata-btn{display:flex !important;}}
.main{display:flex;flex-direction:column;gap:10px;}
.tab-row{display:flex;border-bottom:0.5px solid var(--border);background:var(--bg);border-radius:var(--radius-lg) var(--radius-lg) 0 0;overflow:hidden;}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;background:transparent;border-top:none;border-left:none;border-right:none;font-family:inherit;transition:color .15s;}
.tab.on{color:var(--text);border-bottom-color:var(--text);font-weight:500;}
.panel{background:var(--bg);border-radius:0 0 var(--radius-lg) var(--radius-lg);border:0.5px solid var(--border);border-top:none;padding:14px;display:flex;flex-direction:column;gap:10px;}
.prog-row{display:flex;align-items:center;gap:8px;}
.prog-bar{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s;}
.prog-txt{font-size:12px;color:var(--text3);white-space:nowrap;}
.card-wrap{border-radius:var(--radius-lg);border:0.5px solid var(--border);background:var(--bg);padding:1.25rem;display:flex;flex-direction:column;gap:10px;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.card-ata{font-size:11px;color:var(--text3);letter-spacing:.05em;}
.report-btn{flex-shrink:0;padding:3px 10px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg);font-size:11px;color:var(--danger-text);cursor:pointer;font-family:inherit;transition:background .15s;}
.report-btn:hover{background:var(--danger-bg);}
.report-btn.reported{background:var(--danger-bg);border-color:transparent;}
.card-q{font-size:18px;font-weight:500;color:var(--text);line-height:1.5;text-align:center;padding:.5rem 0;cursor:pointer;}
.card-hint{font-size:12px;color:var(--text3);text-align:center;margin-top:4px;}
.card-a{font-size:14px;color:var(--text2);line-height:1.8;border-top:0.5px solid var(--border);padding-top:12px;}
.disclaimer{font-size:11px;color:var(--warning-text);background:var(--warning-bg);border-radius:var(--radius);padding:6px 10px;line-height:1.5;}
.card-oral{font-size:13px;color:var(--text2);text-align:center;}
.loading-box{display:flex;flex-direction:column;align-items:center;gap:12px;padding:3rem;}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--info-text);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:13px;color:var(--text2);}
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.btn{padding:9px 20px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text);transition:background .15s;}
.btn:hover{background:var(--bg2);}
.btn-d{color:var(--danger-text);}
.btn-d:hover{background:var(--danger-bg);}
.btn-s{color:var(--success-text);}
.btn-s:hover{background:var(--success-bg);}
.btn-i{color:var(--info-text);}
.btn-i:hover{background:var(--info-bg);}
.stats-row{display:flex;gap:6px;}
.st{flex:1;background:var(--bg2);border-radius:var(--radius);padding:8px 4px;text-align:center;}
.st-n{font-size:18px;font-weight:500;color:var(--text);}
.st-l{font-size:11px;color:var(--text3);margin-top:2px;}
.done-box{border:0.5px solid var(--border);border-radius:var(--radius-lg);background:var(--bg);padding:2rem;text-align:center;}
.done-box h2{font-size:18px;font-weight:500;margin-bottom:6px;}
.done-box p{font-size:13px;color:var(--text2);margin-bottom:1rem;}
.err-box{padding:1rem;border-radius:var(--radius);background:var(--danger-bg);color:var(--danger-text);font-size:13px;text-align:center;}
.report-panel h3{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:10px;}
.report-item{font-size:12px;color:var(--text2);padding:8px 0;border-bottom:0.5px solid var(--border);line-height:1.6;}
.report-item:last-child{border-bottom:none;}
.report-q{font-weight:500;color:var(--text);margin-top:2px;}
.empty-report{font-size:12px;color:var(--text3);text-align:center;padding:12px 0;}
.del-btn{padding:3px 8px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;font-size:11px;cursor:pointer;color:var(--text3);font-family:inherit;}
.del-btn:hover{background:var(--bg2);}
.modal-bg{position:relative;min-height:220px;background:rgba(0,0,0,0.38);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;margin-top:6px;}
.modal-box{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:1.25rem;width:90%;max-width:320px;}
.modal-box h3{font-size:14px;font-weight:500;margin-bottom:8px;}
.modal-box p{font-size:12px;color:var(--text2);margin-bottom:10px;}
.modal-box textarea{width:100%;border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);resize:none;height:80px;}
.modal-box textarea:focus{outline:none;}
.modal-btns{display:flex;gap:8px;margin-top:10px;justify-content:flex-end;}
.modal-cancel{padding:7px 14px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;font-size:13px;cursor:pointer;font-family:inherit;color:var(--text2);}
.modal-submit{padding:7px 14px;border-radius:var(--radius);border:none;background:var(--danger-bg);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--danger-text);}

/* 오른쪽 사이드바 */
.sidebar{position:sticky;top:58px;background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);overflow:hidden;max-height:calc(100vh - 80px);display:flex;flex-direction:column;}
.sidebar-header{padding:12px 14px 10px;border-bottom:0.5px solid var(--border);font-size:12px;font-weight:500;color:var(--text2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sidebar-total{font-size:11px;color:var(--text3);font-weight:400;}
.ata-list{overflow-y:auto;flex:1;padding:4px 0;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.ata-list::-webkit-scrollbar{width:4px;}
.ata-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.ata-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;transition:background .12s;border:none;background:transparent;width:100%;text-align:left;font-family:inherit;}
.ata-progress{margin-left:auto;font-size:10px;color:var(--text3);background:var(--bg2);padding:2px 6px;border-radius:10px;white-space:nowrap;}
.ata-item.on .ata-progress{background:rgba(255,255,255,0.2);color:var(--info-text);}
.wrong-item{padding:10px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.wrong-item:last-child{border-bottom:none;}
.wrong-item .wq{font-weight:500;color:var(--text);margin-bottom:4px;}
.wrong-item .wch{font-size:11px;color:var(--text3);}
.wrong-clear{font-size:12px;color:var(--danger-text);cursor:pointer;background:none;border:none;font-family:inherit;padding:0;}
.ata-item:hover{background:var(--bg2);}
.ata-item.on{background:var(--info-bg);}
.ata-num{font-size:11px;font-weight:500;color:var(--text3);min-width:26px;}
.ata-item.on .ata-num{color:var(--info-text);}
.ata-name{font-size:13px;color:var(--text2);}
.ata-item.on .ata-name{color:var(--info-text);font-weight:500;}

/* 모바일용 버튼 */
.mobile-ata-btn{display:none;width:100%;padding:10px 14px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg);font-size:13px;color:var(--text2);font-family:inherit;cursor:pointer;text-align:left;align-items:center;justify-content:space-between;}
.random-btn{width:100%;padding:10px 14px;border:none;border-bottom:0.5px solid var(--border);background:var(--info-bg);color:var(--info-text);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s;flex-shrink:0;}
.random-btn:hover{background:var(--info-text);color:var(--bg);}
.random-btn.on{background:var(--info-text);color:var(--bg);}
.mobile-random-btn{display:none;width:100%;padding:10px 14px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--info-bg);color:var(--info-text);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;margin-bottom:6px;}
@media(max-width:680px){.mobile-random-btn{display:block;}}

/* 모바일 드로어 */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;}
.drawer-overlay.open{display:block;}
.drawer{position:fixed;right:0;top:0;bottom:0;width:220px;background:var(--bg);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;}
.drawer.open{transform:translateX(0);}
.drawer-head{padding:14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:500;}
.drawer-close{padding:4px 10px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;font-size:12px;cursor:pointer;font-family:inherit;color:var(--text2);}
.drawer-list{overflow-y:auto;flex:1;padding:4px 0;}

footer{text-align:center;padding:20px;font-size:12px;color:var(--text3);border-top:0.5px solid var(--border);margin-top:8px;}
</style>

<body>

<header>
  <span class="logo">AME<span>Quiz</span></span>
  <span class="header-badge" id="q-badge">챕터 선택</span>
  <span class="active-badge" id="active-users">접속 중...</span>
</header>

<div class="page">
  <div class="main">
    <button class="mobile-random-btn" onclick="startRandomAll()">&#9734; 전체 랜덤 모드</button>
    <button class="mobile-ata-btn" onclick="openDrawer()">
      <span id="mobile-ch-label">ATA 챕터 선택하기</span>
      <span>&#9776;</span>
    </button>

    <div class="tab-row">
      <button class="tab on" onclick="switchTab('study',this)">학습</button>
      <button class="tab" onclick="switchTab('wrong',this)">오답 <span id="wrong-count"></span></button>
      <button class="tab" onclick="switchTab('reports',this)">오류 신고 <span id="rep-count"></span></button>
    </div>

    <div class="panel" id="tab-study" style="display:flex;flex-direction:column;">
      <div class="prog-row">
        <div class="prog-bar"><div class="prog-fill" id="pf" style="width:0%"></div></div>
        <span class="prog-txt" id="pt">0 / 0</span>
      </div>
      <div id="card-area">
        <div class="loading-box">
          <div class="spinner"></div>
          <span class="loading-txt">오른쪽에서 ATA 챕터를 선택하세요</span>
        </div>
      </div>
      <div class="btn-row" id="rate-btns" style="display:none;">
        <button class="btn btn-d" onclick="rate('again')">다시</button>
        <button class="btn btn-s" onclick="rate('good')">알겠음</button>
        <button class="btn btn-i" onclick="rate('easy')">쉬움</button>
      </div>
      <div class="stats-row">
        <div class="st"><div class="st-n" id="s-again">0</div><div class="st-l">다시</div></div>
        <div class="st"><div class="st-n" id="s-good">0</div><div class="st-l">알겠음</div></div>
        <div class="st"><div class="st-n" id="s-easy">0</div><div class="st-l">쉬움</div></div>
      </div>
    </div>

    <div class="panel" id="tab-wrong" style="display:none;flex-direction:column;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <span style="font-size:13px;font-weight:500;color:var(--text2);">틀린 문제 모음</span>
        <button class="btn btn-d" style="padding:5px 12px;font-size:12px;" onclick="startWrongMode()">오답만 풀기</button>
      </div>
      <div id="wrong-list"><span class="empty-report">아직 틀린 문제가 없어요</span></div>
    </div>

    <div class="panel" id="tab-reports" style="display:none;">
      <div class="report-panel">
        <h3>신고된 질문 목록</h3>
        <div id="report-list"><span class="empty-report">아직 신고된 항목이 없습니다</span></div>
      </div>
    </div>
  </div>

  <!-- 오른쪽 사이드바 -->
  <div class="sidebar">
    <div class="sidebar-header" style="flex-direction:column;align-items:stretch;gap:8px;padding-bottom:8px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span id="sidebar-mode-label">ATA 챕터</span>
        <span class="sidebar-total" id="sidebar-total-label">1230문항</span>
      </div>
      <div style="display:flex;gap:4px;">
        <button id="mode-ata-btn" onclick="switchMode('ata')" style="flex:1;padding:5px 4px;border-radius:6px;border:0.5px solid var(--border2);background:var(--info-bg);color:var(--info-text);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;">ATA 기본</button>
        <button id="mode-oral-btn" onclick="switchMode('oral')" style="flex:1;padding:5px 4px;border-radius:6px;border:0.5px solid var(--border);background:transparent;color:var(--text3);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;">📋 구술 후기</button>
      </div>
    </div>
    <button class="random-btn" onclick="startRandomAll()" id="random-btn">
      &#9734; 전체 랜덤
    </button>
    <div class="ata-list" id="ata-list"></div>
  </div>
</div>

<!-- 모바일 드로어 -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    ATA 챕터
    <button class="drawer-close" onclick="closeDrawer()">닫기</button>
  </div>
  <div class="drawer-list" id="drawer-list"></div>
</div>

<footer>
  AMEQuiz · 항공정비사 구술시험 대비 · 1230문항<br>
  ⚠ 학습용 답변입니다. 공식 교재(AMM)를 반드시 함께 참고하세요.
</footer>

  {num:'oral_deice_misc',  name:'제방빙/기타'},
];
const ORAL_FILE = 'questions_oral_review.json';
let currentMode = 'ata';

let curChapter=null,queue=[],flipped=false,isLoading=false;
let ct={again:0,good:0,easy:0},reports=[],pendingReport=null;
let wrongList=JSON.parse(localStorage.getItem('ame_wrong')||'[]');
let progress=JSON.parse(localStorage.getItem('ame_progress')||'{}');

function saveWrong(){localStorage.setItem('ame_wrong',JSON.stringify(wrongList));}
function saveProgress(){localStorage.setItem('ame_progress',JSON.stringify(progress));}

function addWrong(c){
  if(!curChapter||curChapter.num==='전체')return;
  const exists=wrongList.find(w=>w.q===c.q);
  if(!exists){
    wrongList.push({q:c.q,a:c.a,chapter:'ATA '+curChapter.num+' '+curChapter.name,count:1});
  } else {
    exists.count=(exists.count||1)+1;
  }
  saveWrong();
  updateWrongCount();
}

function removeWrong(q){
  wrongList=wrongList.filter(w=>w.q!==q);
  saveWrong();
  updateWrongCount();
  renderWrongList();
}

function updateWrongCount(){
  const el=document.getElementById('wrong-count');
  if(el) el.textContent=wrongList.length>0?'('+wrongList.length+')':'';
}

function updateProgressRecord(){
  if(!curChapter||curChapter.num==='전체')return;
  const key=curChapter.num;
  if(!progress[key]) progress[key]={good:0,easy:0,total:0};
  progress[key].good=ct.good;
  progress[key].easy=ct.easy;
  saveProgress();
  updateSidebarProgress();
}

function updateSidebarProgress(){
  ATA_CHAPTERS.forEach(ch=>{
    const p=progress[ch.num];
    document.querySelectorAll('.ata-progress[data-num="'+ch.num+'"]').forEach(el=>{
      if(p&&(p.good+p.easy)>0){
        const pct=Math.round((p.good+p.easy)/15*100);
        el.textContent=pct+'%';
        el.style.color='var(--success-text)';
        el.style.background='var(--success-bg)';
      }
    });
  });
}

async function startWrongMode(){
  if(!wrongList.length){alert('아직 틀린 문제가 없어요!');return;}
  curChapter={num:'오답',name:'모아보기'};
  queue=shuffle([...wrongList]);
  ct={again:0,good:0,easy:0};
  updateStats();
  document.querySelectorAll('.ata-item').forEach(el=>el.classList.remove('on'));
  document.getElementById('random-btn').classList.remove('on');
  document.getElementById('mobile-ch-label').textContent='오답 모아보기';
  document.getElementById('q-badge').textContent='오답 · '+wrongList.length+'문항';
  flipped=false;
  switchTab('study',document.querySelector('.tab'));
  showCard();
}

function renderWrongList(){
  const list=document.getElementById('wrong-list');
  if(!wrongList.length){list.innerHTML='<span class="empty-report">아직 틀린 문제가 없어요</span>';return;}
  list.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span style="font-size:12px;color:var(--text3);">총 ${wrongList.length}문제</span>
    <button class="wrong-clear" onclick="clearAllWrong()">전체 삭제</button>
  </div>`+wrongList.map((w,i)=>`
    <div class="wrong-item">
      <div class="wch">${w.chapter} · ${w.count||1}회 틀림</div>
      <div class="wq">${w.q}</div>
      <button class="wrong-clear" onclick="removeWrong('${w.q.replace(/'/g,"\'")}')">삭제</button>
    </div>`).join('');
}

function clearAllWrong(){
  if(!confirm('오답 목록을 전체 삭제할까요?'))return;
  wrongList=[];saveWrong();updateWrongCount();renderWrongList();
}

async function startRandomAll(){
  if(isLoading)return;
  if(currentMode === 'oral'){
    // 구술 후기 전체 랜덤
    isLoading=true;
    document.getElementById('rate-btns').style.display='none';
    document.getElementById('card-area').innerHTML=`<div class="loading-box"><div class="spinner"></div><span class="loading-txt">구술 후기 83문항 불러오는 중...</span></div>`;
    document.getElementById('q-badge').textContent='로딩 중...';
    try{
      if(!jsonCache[ORAL_FILE]){
        const res=await fetch(ORAL_FILE);
        if(!res.ok)throw new Error('실패');
        jsonCache[ORAL_FILE]=await res.json();
      }
      let all=[];
      ORAL_CATEGORIES.forEach(cat=>{
        if(jsonCache[ORAL_FILE][cat.num]) all=all.concat(jsonCache[ORAL_FILE][cat.num]);
      });
      queue=shuffle([...all]);
      curChapter={num:'구술전체',name:'랜덤'};
      ct={again:0,good:0,easy:0};
      updateStats();
      isLoading=false;
      document.getElementById('q-badge').textContent='구술 전체 랜덤 · '+all.length+'문항';
      document.querySelectorAll('.ata-item').forEach(el=>el.classList.remove('on'));
      document.getElementById('random-btn').classList.add('on');
      document.getElementById('mobile-ch-label').textContent='구술 전체 랜덤';
      flipped=false;
      showCard();
    }catch(e){
      isLoading=false;
      document.getElementById('card-area').innerHTML=`<div class="err-box">불러오지 못했습니다. 다시 시도해 주세요.</div>`;
    }
    return;
  }
  // ATA 기본 전체 랜덤
  const files=[...new Set(Object.values(JSON_FILES))];
  isLoading=true;
  document.getElementById('rate-btns').style.display='none';
  document.getElementById('card-area').innerHTML=`
    <div class="loading-box"><div class="spinner"></div>
    <span class="loading-txt">전체 1230문항 불러오는 중...</span></div>`;
  document.getElementById('q-badge').textContent='로딩 중...';
  try{
    for(const f of files){
      if(!jsonCache[f]){
        const res=await fetch(f);
        if(!res.ok)throw new Error('실패');
        jsonCache[f]=await res.json();
      }
    }
    // 전체 문항 합치기
    let all=[];
    ATA_CHAPTERS.forEach(ch=>{
      const f=JSON_FILES[ch.num];
      if(f&&jsonCache[f]&&jsonCache[f][ch.num]){
        all=all.concat(jsonCache[f][ch.num]);
      }
    });
    queue=shuffle([...all]);
    curChapter={num:'전체',name:'랜덤'};
    ct={again:0,good:0,easy:0};
    updateStats();
    isLoading=false;
    document.getElementById('q-badge').textContent='전체 랜덤 · '+all.length+'문항';
    // 사이드바 선택 해제
    document.querySelectorAll('.ata-item').forEach(el=>el.classList.remove('on'));
    document.getElementById('random-btn').classList.add('on');
    document.getElementById('mobile-ch-label').textContent='전체 랜덤 모드';
    flipped=false;
    showCard();
  }catch(e){
    isLoading=false;
    document.getElementById('card-area').innerHTML=`<div class="err-box">불러오지 못했습니다. 다시 시도해 주세요.</div>`;
    document.getElementById('q-badge').textContent='오류';
  }
}

function switchMode(mode){
  currentMode = mode;
  const ataBtn = document.getElementById('mode-ata-btn');
  const oralBtn = document.getElementById('mode-oral-btn');
  const label = document.getElementById('sidebar-mode-label');
  const total = document.getElementById('sidebar-total-label');
  if(mode === 'oral'){
    ataBtn.style.background='transparent'; ataBtn.style.color='var(--text3)'; ataBtn.style.borderColor='var(--border)';
    oralBtn.style.background='var(--warning-bg)'; oralBtn.style.color='var(--warning-text)'; oralBtn.style.borderColor='var(--border2)';
    label.textContent = '구술 후기 문제';
    total.textContent = '83문항';
    document.getElementById('random-btn').textContent = '★ 구술 전체 랜덤';
  } else {
    oralBtn.style.background='transparent'; oralBtn.style.color='var(--text3)'; oralBtn.style.borderColor='var(--border)';
    ataBtn.style.background='var(--info-bg)'; ataBtn.style.color='var(--info-text)'; ataBtn.style.borderColor='var(--border2)';
    label.textContent = 'ATA 챕터';
    total.textContent = '1230문항';
    document.getElementById('random-btn').textContent = '☆ 전체 랜덤';
  }
  buildSidebar();
  curChapter = null;
  ct={again:0,good:0,easy:0};
  updateStats();
  document.getElementById('card-area').innerHTML=`<div class="loading-box"><span class="loading-txt">${mode==='oral'?'카테고리를 선택하세요':'오른쪽에서 ATA 챕터를 선택하세요'}</span></div>`;
  document.getElementById('rate-btns').style.display='none';
  document.getElementById('q-badge').textContent='챕터 선택';
}

async function loadOralCategory(cat){
  if(isLoading)return;
  isLoading=true;
  curChapter={num:cat.num, name:cat.name};
  ct={again:0,good:0,easy:0};
  updateStats();
  document.getElementById('rate-btns').style.display='none';
  document.getElementById('card-area').innerHTML=`<div class="loading-box"><div class="spinner"></div><span class="loading-txt">${cat.name} 불러오는 중...</span></div>`;
  document.getElementById('q-badge').textContent='로딩 중...';
  document.querySelectorAll('.ata-item').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.ata-item[data-num="'+cat.num+'"]').forEach(el=>el.classList.add('on'));
  document.getElementById('random-btn').classList.remove('on');
  document.getElementById('mobile-ch-label').textContent=cat.name;
  try{
    if(!jsonCache[ORAL_FILE]){
      const res=await fetch(ORAL_FILE);
      if(!res.ok)throw new Error('실패');
      jsonCache[ORAL_FILE]=await res.json();
    }
    const qs=jsonCache[ORAL_FILE][cat.num];
    if(!qs||!qs.length)throw new Error('비어있음');
    queue=shuffle([...qs]);
    isLoading=false;
    document.getElementById('q-badge').textContent=cat.name+' · '+qs.length+'문항';
    flipped=false;
    showCard();
  }catch(e){
    isLoading=false;
    document.getElementById('card-area').innerHTML=`<div class="err-box">불러오지 못했습니다.<br>questions_oral_review.json 파일을 확인해 주세요.</div>`;
    document.getElementById('q-badge').textContent='오류';
  }
}

function buildSidebar(){
  const sideList=document.getElementById('ata-list');
  const drawList=document.getElementById('drawer-list');
  [sideList,drawList].forEach(c=>c.innerHTML='');

  if(currentMode === 'oral'){
    ORAL_CATEGORIES.forEach(cat=>{
      [sideList,drawList].forEach(container=>{
        const btn=document.createElement('button');
        btn.className='ata-item';
        btn.dataset.num=cat.num;
        const countMap={oral_law:15,oral_structure_material:15,oral_landing_gear:7,oral_fuel_hydraulic:7,oral_electrical:8,oral_engine_fire:10,oral_pressurization_oxygen:5,oral_navigation_instrument:8,oral_deice_misc:8};
        btn.innerHTML=`<span class="ata-name" style="flex:1;">${cat.name}</span><span class="ata-progress" data-num="${cat.num}">${countMap[cat.num]||''}문항</span>`;
        btn.onclick=()=>{loadOralCategory(cat);closeDrawer();};
        container.appendChild(btn);
      });
    });
  } else {
    ATA_CHAPTERS.forEach(ch=>{
      [sideList,drawList].forEach(container=>{
        const btn=document.createElement('button');
        btn.className='ata-item';
        btn.dataset.num=ch.num;
        btn.innerHTML=`<span class="ata-num">${ch.num}</span><span class="ata-name">${ch.name}</span><span class="ata-progress" data-num="${ch.num}"></span>`;
        btn.onclick=()=>{selectChapter(ch);closeDrawer();};
        container.appendChild(btn);
      });
    });
    updateSidebarProgress();
  }
}

function selectChapter(ch){
  if(isLoading)return;
  curChapter=ch;
  ct={again:0,good:0,easy:0};
  updateStats();
  document.querySelectorAll('.ata-item').forEach(el=>{
    el.classList.toggle('on',el.dataset.num===ch.num);
  });
  document.getElementById('random-btn').classList.remove('on');
  document.getElementById('mobile-ch-label').textContent='ATA '+ch.num+' '+ch.name;
  loadQuestions(ch);
}

async function loadQuestions(ch){
  isLoading=true;
  document.getElementById('rate-btns').style.display='none';
  document.getElementById('card-area').innerHTML=`
    <div class="loading-box"><div class="spinner"></div>
    <span class="loading-txt">ATA ${ch.num} ${ch.name} 불러오는 중...</span></div>`;
  document.getElementById('q-badge').textContent='로딩 중...';
  try{
    const fileName=JSON_FILES[ch.num];
    if(!fileName)throw new Error('없음');
    if(!jsonCache[fileName]){
      const res=await fetch(fileName);
      if(!res.ok)throw new Error('실패');
      jsonCache[fileName]=await res.json();
    }
    const qs=jsonCache[fileName][ch.num];
    if(!qs||!qs.length)throw new Error('비어있음');
    queue=shuffle([...qs]);
    isLoading=false;
    document.getElementById('q-badge').textContent='ATA '+ch.num+' · '+qs.length+'문항';
    flipped=false;
    showCard();
  }catch(e){
    isLoading=false;
    document.getElementById('card-area').innerHTML=`<div class="err-box">질문을 불러오지 못했습니다.<br>JSON 파일이 같은 폴더에 있는지 확인해 주세요.</div>`;
    document.getElementById('q-badge').textContent='오류';
  }
}

function shuffle(a){return a.sort(()=>Math.random()-.5);}

function showCard(){
  document.getElementById('rate-btns').style.display='none';
  if(!queue.length){showDone();return;}
  const c=queue[0];
  const isRep=reports.some(r=>r.q===c.q);
  const chLabel = curChapter.num.startsWith("oral") ? curChapter.name : "ATA "+curChapter.num+" · "+curChapter.name;
  document.getElementById('card-area').innerHTML=`
    <div class="card-wrap">
      <div class="card-top">
        <span class="card-ata">${chLabel}</span>
        <button class="report-btn${isRep?' reported':''}" onclick="openModal()" id="rep-btn">${isRep?'신고됨':'오류 신고'}</button>
      </div>
      <div onclick="flipCard()">
        <div class="card-q">${c.q}</div>
        <div class="card-hint">탭하여 모범답안 확인</div>
      </div>
      <div class="disclaimer">⚠ 학습용 답변입니다. 공식 교재(AMM)와 함께 활용하세요.</div>
    </div>
    <p class="card-oral" style="margin-top:8px;">소리 내어 답을 말해본 뒤 확인하세요</p>`;
  flipped=false;
  updateProg();
}

function flipCard(){
  if(flipped||!queue.length)return;
  flipped=true;
  const c=queue[0];
  const isRep=reports.some(r=>r.q===c.q);
  const chLabel = curChapter.num.startsWith("oral") ? curChapter.name : "ATA "+curChapter.num+" · "+curChapter.name;
  document.getElementById('card-area').innerHTML=`
    <div class="card-wrap">
      <div class="card-top">
        <span class="card-ata">${chLabel}</span>
        <button class="report-btn${isRep?' reported':''}" onclick="openModal()" id="rep-btn">${isRep?'신고됨':'오류 신고'}</button>
      </div>
      <div class="card-q" style="cursor:default;">${c.q}</div>
      <div class="card-a">${c.a}</div>
      <div class="disclaimer">⚠ 학습용 답변입니다. 공식 교재(AMM)와 함께 활용하세요.</div>
    </div>`;
  document.getElementById('rate-btns').style.display='flex';
}

const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSfTbGPgfddX4XwaJvBLITeMQUDqlRChrjk5TnDUFIXWdlVXBg/viewform?usp=publish-editor';

function openModal(){
  if(!queue.length)return;
  pendingReport=queue[0];
  // 구글 폼에 질문 내용 미리 채워서 열기
  const q = encodeURIComponent('[ATA '+curChapter.num+' '+curChapter.name+'] '+pendingReport.q);
  window.open(FORM_URL+'&entry.0='+q, '_blank');
  // 신고됨 표시
  const existing=reports.find(r=>r.q===pendingReport.q);
  if(!existing){
    reports.push({q:pendingReport.q,a:pendingReport.a,chapter:'ATA '+curChapter.num+' '+curChapter.name,reason:'구글 폼으로 신고됨',time:new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})});
    updateRepCount();
  }
  flipped?flipCard_refresh():showCard();
}
function closeModal(){const o=document.getElementById('modal-overlay');if(o)o.remove();pendingReport=null;}
function submitReport(){
  const reason=document.getElementById('report-reason').value.trim();
  const idx=reports.findIndex(r=>r.q===pendingReport.q);
  const entry={q:pendingReport.q,a:pendingReport.a,chapter:'ATA '+curChapter.num+' '+curChapter.name,reason:reason||'오류 내용 미기재',time:new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})};
  if(idx>=0)reports[idx]=entry;else reports.push(entry);
  updateRepCount();closeModal();
  flipped?flipCard_refresh():showCard();
}
function flipCard_refresh(){const btn=document.getElementById('rep-btn');if(btn){btn.textContent='신고됨';btn.classList.add('reported');}}

function rate(r){
  const c=queue[0];
  ct[r]++;
  if(r==='again'){
    addWrong(c);
    const card=queue.shift();queue.push(card);
  } else {
    queue.shift();
  }
  updateStats();
  updateProgressRecord();
  showCard();
}
function updateStats(){
  document.getElementById('s-again').textContent=ct.again;
  document.getElementById('s-good').textContent=ct.good;
  document.getElementById('s-easy').textContent=ct.easy;
}
function updateProg(){
  if(!curChapter)return;
  const base=queue.length+ct.good+ct.easy;
  const done=ct.good+ct.easy;
  const pct=base?Math.round(done/base*100):0;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pt').textContent=done+' / '+base;
}
function updateRepCount(){document.getElementById('rep-count').textContent=reports.length>0?'('+reports.length+')':'';}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tab-study').style.display=tab==='study'?'flex':'none';
  document.getElementById('tab-wrong').style.display=tab==='wrong'?'flex':'none';
  document.getElementById('tab-reports').style.display=tab==='reports'?'flex':'none';
  if(tab==='reports')renderReportList();
  if(tab==='wrong')renderWrongList();
}
function renderReportList(){
  const list=document.getElementById('report-list');
  if(!reports.length){list.innerHTML='<span class="empty-report">아직 신고된 항목이 없습니다</span>';return;}
  list.innerHTML=reports.map((r,i)=>`
    <div class="report-item">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div>
          <span style="font-size:10px;color:var(--text3);">${r.chapter} · ${r.time}</span>
          <div class="report-q">${r.q}</div>
          <div style="font-size:12px;color:var(--danger-text);margin-top:2px;">사유: ${r.reason}</div>
        </div>
        <button class="del-btn" onclick="deleteReport(${i})">삭제</button>
      </div>
    </div>`).join('');
}
function deleteReport(i){reports.splice(i,1);updateRepCount();renderReportList();}
function showDone(){
  document.getElementById('card-area').innerHTML=`
    <div class="done-box">
      <h2>학습 완료!</h2>
      <p>알겠음 ${ct.good}개 · 쉬움 ${ct.easy}개 · 반복 ${ct.again}회</p>
      <button class="btn" onclick="reloadChapter()">다시 학습하기</button>
    </div>`;
}
function reloadChapter(){if(curChapter){ct={again:0,good:0,easy:0};updateStats();loadQuestions(curChapter);}}
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');}

buildSidebar();
updateWrongCount();
updateSidebarProgress();
</script>
