<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>항공정비사 구술 플래시카드 | AME Quiz</title>
<meta name="description" content="항공정비사(AME) 자격증 구술시험 대비 플래시카드. ATA 챕터별 AI 생성 질문으로 효과적으로 준비하세요.">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f4;
    --bg3: #eeede8;
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --text3: #9a9a9a;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --info-bg: #e6f1fb;
    --info-text: #0c447c;
    --success-bg: #eaf3de;
    --success-text: #3b6d11;
    --danger-bg: #fcebeb;
    --danger-text: #a32d2d;
    --warning-bg: #faeeda;
    --warning-text: #854f0b;
    --radius: 8px;
    --radius-lg: 12px;
    --green: #1D9E75;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1b;
      --bg2: #262625;
      --bg3: #2e2e2c;
      --text: #f0efea;
      --text2: #a8a8a0;
      --text3: #6a6a62;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
      --info-bg: #042c53;
      --info-text: #85b7eb;
      --success-bg: #173404;
      --success-text: #97c459;
      --danger-bg: #501313;
      --danger-text: #f09595;
      --warning-bg: #412402;
      --warning-text: #ef9f27;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* HEADER */
  header {
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { font-size: 16px; font-weight: 500; color: var(--text); }
  .logo span { color: var(--green); }
  .header-badge {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    background: var(--info-bg); color: var(--info-text); font-weight: 500;
  }

  /* LAYOUT */
  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px 12px;
    display: grid;
    grid-template-columns: 160px minmax(0, 1fr) 160px;
    gap: 14px;
    align-items: start;
  }
  @media (max-width: 900px) {
    .page { grid-template-columns: minmax(0,1fr); }
    .ad-col { display: none; }
  }

  /* ADS */
  .ad-col { display: flex; flex-direction: column; gap: 10px; }
  .ad-box {
    border: 0.5px dashed var(--border2);
    border-radius: var(--radius);
    background: var(--bg2);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5px; padding: 10px 6px; text-align: center;
  }
  .ad-lbl { font-size: 10px; color: var(--text3); letter-spacing: .05em; }
  .ad-slot {
    width: 100%; border-radius: 6px; background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--text3);
  }
  .ad-cta { font-size: 11px; color: var(--info-text); }

  /* MAIN */
  .main { display: flex; flex-direction: column; gap: 10px; }

  /* TABS */
  .tab-row {
    display: flex; gap: 0;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    overflow: hidden;
  }
  .tab {
    padding: 10px 16px; font-size: 13px; cursor: pointer;
    color: var(--text3); border-bottom: 2px solid transparent;
    margin-bottom: -1px; background: transparent;
    border-top: none; border-left: none; border-right: none;
    font-family: inherit; transition: color .15s;
  }
  .tab.on { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }

  /* CARD PANEL */
  .panel {
    background: var(--bg);
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    border: 0.5px solid var(--border);
    border-top: none;
    padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
  }

  /* ATA CHIPS */
  .ata-scroll {
    display: flex; gap: 6px; overflow-x: auto;
    padding-bottom: 4px; scrollbar-width: none;
  }
  .ata-scroll::-webkit-scrollbar { display: none; }
  .ata-chip {
    flex-shrink: 0; padding: 5px 11px; border-radius: 20px;
    border: 0.5px solid var(--border); background: var(--bg);
    font-size: 12px; cursor: pointer; color: var(--text2);
    white-space: nowrap; font-family: inherit;
    transition: background .15s;
  }
  .ata-chip.on {
    background: var(--info-bg); border-color: transparent;
    color: var(--info-text); font-weight: 500;
  }
  .ata-chip:hover:not(.on) { background: var(--bg2); }

  /* PROGRESS */
  .prog-row { display: flex; align-items: center; gap: 8px; }
  .prog-bar { flex: 1; height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .4s; }
  .prog-txt { font-size: 12px; color: var(--text3); white-space: nowrap; }

  /* CARD */
  .card-wrap {
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    background: var(--bg);
    padding: 1.25rem;
    display: flex; flex-direction: column; gap: 10px;
  }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-ata { font-size: 11px; color: var(--text3); letter-spacing: .05em; }
  .report-btn {
    flex-shrink: 0; padding: 3px 10px; border-radius: 20px;
    border: 0.5px solid var(--border2); background: var(--bg);
    font-size: 11px; color: var(--danger-text); cursor: pointer;
    font-family: inherit; transition: background .15s;
  }
  .report-btn:hover { background: var(--danger-bg); }
  .report-btn.reported { background: var(--danger-bg); border-color: transparent; }
  .card-q {
    font-size: 18px; font-weight: 500; color: var(--text);
    line-height: 1.5; text-align: center; padding: .5rem 0; cursor: pointer;
  }
  .card-hint { font-size: 12px; color: var(--text3); text-align: center; margin-top: 4px; }
  .card-a {
    font-size: 14px; color: var(--text2); line-height: 1.8;
    border-top: 0.5px solid var(--border); padding-top: 12px;
  }
  .disclaimer {
    font-size: 11px; color: var(--warning-text);
    background: var(--warning-bg); border-radius: var(--radius);
    padding: 6px 10px; line-height: 1.5;
  }
  .card-oral { font-size: 13px; color: var(--text2); text-align: center; }

  /* LOADING */
  .loading-box {
    display: flex; flex-direction: column;
    align-items: center; gap: 12px; padding: 2.5rem;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--info-text);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-txt { font-size: 13px; color: var(--text2); }

  /* BUTTONS */
  .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .btn {
    padding: 9px 20px; border-radius: var(--radius);
    border: 0.5px solid var(--border); background: var(--bg);
    font-size: 13px; font-weight: 500; cursor: pointer;
    font-family: inherit; color: var(--text);
    transition: background .15s;
  }
  .btn:hover { background: var(--bg2); }
  .btn-d { color: var(--danger-text); }
  .btn-d:hover { background: var(--danger-bg); }
  .btn-s { color: var(--success-text); }
  .btn-s:hover { background: var(--success-bg); }
  .btn-i { color: var(--info-text); }
  .btn-i:hover { background: var(--info-bg); }

  /* STATS */
  .stats-row { display: flex; gap: 6px; }
  .st { flex: 1; background: var(--bg2); border-radius: var(--radius); padding: 8px 4px; text-align: center; }
  .st-n { font-size: 18px; font-weight: 500; color: var(--text); }
  .st-l { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* DONE */
  .done-box {
    border: 0.5px solid var(--border); border-radius: var(--radius-lg);
    background: var(--bg); padding: 2rem; text-align: center;
  }
  .done-box h2 { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
  .done-box p { font-size: 13px; color: var(--text2); margin-bottom: 1rem; }

  /* ERROR */
  .err-box {
    padding: 1rem; border-radius: var(--radius);
    background: var(--danger-bg); color: var(--danger-text);
    font-size: 13px; text-align: center;
  }

  /* REPORT LIST */
  .report-panel h3 { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 10px; }
  .report-item {
    font-size: 12px; color: var(--text2);
    padding: 8px 0; border-bottom: 0.5px solid var(--border);
    line-height: 1.6;
  }
  .report-item:last-child { border-bottom: none; }
  .report-q { font-weight: 500; color: var(--text); margin-top: 2px; }
  .empty-report { font-size: 12px; color: var(--text3); text-align: center; padding: 12px 0; }
  .del-btn {
    padding: 3px 8px; border-radius: var(--radius);
    border: 0.5px solid var(--border); background: transparent;
    font-size: 11px; cursor: pointer; color: var(--text3);
    font-family: inherit;
  }
  .del-btn:hover { background: var(--bg2); }

  /* MODAL */
  .modal-bg {
    position: relative; min-height: 220px;
    background: rgba(0,0,0,0.38);
    border-radius: var(--radius-lg);
    display: flex; align-items: center; justify-content: center;
    margin-top: 6px;
  }
  .modal-box {
    background: var(--bg); border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    padding: 1.25rem; width: 90%; max-width: 320px;
  }
  .modal-box h3 { font-size: 14px; font-weight: 500; margin-bottom: 8px; }
  .modal-box p { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  .modal-box textarea {
    width: 100%; border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 8px;
    font-size: 13px; font-family: inherit;
    color: var(--text); background: var(--bg);
    resize: none; height: 80px;
  }
  .modal-box textarea:focus { outline: none; border-color: var(--border2); }
  .modal-btns { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }
  .modal-cancel {
    padding: 7px 14px; border-radius: var(--radius);
    border: 0.5px solid var(--border); background: transparent;
    font-size: 13px; cursor: pointer; font-family: inherit; color: var(--text2);
  }
  .modal-submit {
    padding: 7px 14px; border-radius: var(--radius);
    border: none; background: var(--danger-bg);
    font-size: 13px; font-weight: 500; cursor: pointer;
    font-family: inherit; color: var(--danger-text);
  }

  /* FOOTER */
  footer {
    text-align: center; padding: 20px;
    font-size: 12px; color: var(--text3);
    border-top: 0.5px solid var(--border);
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <span class="logo">AME<span>Quiz</span></span>
  <span class="header-badge" id="q-badge">챕터 선택</span>
</header>

<div class="page">
  <!-- 왼쪽 광고 -->
  <div class="ad-col">
    <div class="ad-box">
      <span class="ad-lbl">광고</span>
      <div class="ad-slot" style="height:90px;">광고 영역</div>
      <span class="ad-cta">더 보기</span>
    </div>
    <div class="ad-box">
      <span class="ad-lbl">광고</span>
      <div class="ad-slot" style="height:200px;">광고 영역</div>
      <span class="ad-cta">자세히</span>
    </div>
  </div>

  <!-- 메인 -->
  <div class="main">
    <div class="tab-row">
      <button class="tab on" onclick="switchTab('study', this)">학습</button>
      <button class="tab" onclick="switchTab('reports', this)">오류 신고 목록 <span id="rep-count"></span></button>
    </div>

    <!-- 학습 탭 -->
    <div class="panel" id="tab-study">
      <div class="ata-scroll" id="ata-scroll"></div>

      <div class="prog-row">
        <div class="prog-bar"><div class="prog-fill" id="pf" style="width:0%"></div></div>
        <span class="prog-txt" id="pt">0 / 0</span>
      </div>

      <div id="card-area">
        <div class="loading-box">
          <div class="spinner"></div>
          <span class="loading-txt">ATA 챕터를 선택하면 AI가 질문을 생성합니다</span>
        </div>
      </div>

      <div class="btn-row" id="rate-btns" style="display:none;">
        <button class="btn btn-d" onclick="rate('again')">다시</button>
        <button class="btn btn-s" onclick="rate('good')">알겠음</button>
        <button class="btn btn-i" onclick="rate('easy')">쉬움</button>
      </div>

      <div class="stats-row">
        <div class="st"><div class="st-n" id="s-again">0</div><div class="st-l">다시</div></div>
        <div class="st"><div class="st-n" id="s-good">0</div><div class="st-l">알겠음</div></div>
        <div class="st"><div class="st-n" id="s-easy">0</div><div class="st-l">쉬움</div></div>
      </div>
    </div>

    <!-- 오류 신고 탭 -->
    <div class="panel" id="tab-reports" style="display:none;">
      <div class="report-panel">
        <h3>신고된 질문 목록</h3>
        <div id="report-list"><span class="empty-report">아직 신고된 항목이 없습니다</span></div>
      </div>
    </div>
  </div>

  <!-- 오른쪽 광고 -->
  <div class="ad-col">
    <div class="ad-box">
      <span class="ad-lbl">광고</span>
      <div class="ad-slot" style="height:200px;">광고 영역</div>
      <span class="ad-cta">자세히</span>
    </div>
    <div class="ad-box">
      <span class="ad-lbl">광고</span>
      <div class="ad-slot" style="height:90px;">광고 영역</div>
      <span class="ad-cta">더 보기</span>
    </div>
  </div>
</div>

<footer>
  AMEQuiz · 항공정비사 구술시험 대비 플래시카드<br>
  ⚠ 이 서비스의 답변은 AI가 생성한 것으로, 공식 교재 및 AMM을 반드시 함께 참고하세요.
</footer>

<script>
const API_KEY = 'YOUR_API_KEY_HERE'; // ← 여기에 Anthropic API 키 입력

const ATA_CHAPTERS = [
  {num:'05',name:'정기점검'},{num:'06',name:'치수 및 구역'},{num:'07',name:'리프팅 및 쇼링'},
  {num:'08',name:'레벨링 및 무게측정'},{num:'09',name:'견인 및 지상취급'},{num:'10',name:'주기 및 계류'},
  {num:'12',name:'서비싱'},{num:'20',name:'표준 작업'},{num:'21',name:'에어컨 및 여압'},
  {num:'22',name:'자동비행'},{num:'23',name:'통신'},{num:'24',name:'전기전원'},
  {num:'26',name:'화재방지'},{num:'27',name:'비행조종'},{num:'28',name:'연료'},
  {num:'29',name:'유압'},{num:'30',name:'결빙방지'},{num:'31',name:'계기'},
  {num:'32',name:'랜딩기어'},{num:'33',name:'조명'},{num:'34',name:'항법'},
  {num:'51',name:'구조 일반'},{num:'53',name:'동체'},{num:'57',name:'날개'},
  {num:'71',name:'동력장치'},{num:'72',name:'엔진'},{num:'73',name:'엔진 연료 및 제어'},
  {num:'74',name:'점화'},{num:'75',name:'블리드에어'},{num:'76',name:'엔진 제어'},
  {num:'77',name:'엔진 지시'},{num:'78',name:'배기'},{num:'79',name:'엔진 오일'},{num:'80',name:'시동'},
];

let curChapter = null, queue = [], flipped = false, isLoading = false;
let ct = {again:0, good:0, easy:0};
let reports = [];
let pendingReport = null;

/* ── 탭 전환 ── */
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tab-study').style.display = tab === 'study' ? 'flex' : 'none';
  document.getElementById('tab-reports').style.display = tab === 'reports' ? 'flex' : 'none';
  if (tab === 'reports') renderReportList();
}

/* ── 칩 생성 ── */
function buildChips() {
  const s = document.getElementById('ata-scroll');
  ATA_CHAPTERS.forEach(ch => {
    const el = document.createElement('button');
    el.className = 'ata-chip';
    el.textContent = 'ATA ' + ch.num + ' ' + ch.name;
    el.onclick = () => selectChapter(ch, el);
    s.appendChild(el);
  });
}

function selectChapter(ch, el) {
  if (isLoading) return;
  document.querySelectorAll('.ata-chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  curChapter = ch;
  ct = {again:0, good:0, easy:0};
  updateStats();
  loadQuestions(ch);
}

/* ── AI 질문 생성 ── */
async function loadQuestions(ch) {
  isLoading = true;
  document.getElementById('rate-btns').style.display = 'none';
  document.getElementById('card-area').innerHTML = `
    <div class="loading-box">
      <div class="spinner"></div>
      <span class="loading-txt">ATA ${ch.num} ${ch.name} 질문 생성 중...</span>
    </div>`;
  document.getElementById('q-badge').textContent = '생성 중...';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `당신은 항공정비사(AME) 자격증 구술시험 전문 출제자입니다. 주어진 ATA 챕터에 대해 구술시험 형식의 질문 목록을 JSON으로만 반환하세요. 반드시 JSON 배열만 출력하고 다른 텍스트는 절대 포함하지 마세요.
형식: [{"q":"질문 내용","a":"모범 답안 (3~5문장)"},...]
규칙: 질문은 "~에 대해 설명하세요", "~의 종류를 설명하세요", "~의 목적은 무엇인가요", "~절차를 설명하세요" 형식. 15개 질문 생성.`,
        messages: [{
          role: 'user',
          content: `ATA Chapter ${ch.num}: ${ch.name} 에 대한 항공정비사 구술시험 질문 15개를 JSON으로 생성하세요.`
        }]
      })
    });

    const data = await res.json();
    const raw = data.content.map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const qs = JSON.parse(clean);
    queue = shuffle([...qs]);
    isLoading = false;
    document.getElementById('q-badge').textContent = 'ATA ' + ch.num + ' · ' + qs.length + '문항';
    flipped = false;
    showCard();
  } catch(e) {
    isLoading = false;
    document.getElementById('card-area').innerHTML = `<div class="err-box">질문 생성 중 오류가 발생했습니다.<br>API 키를 확인하거나 다시 시도해 주세요.</div>`;
    document.getElementById('q-badge').textContent = '오류';
  }
}

function shuffle(a) { return a.sort(() => Math.random() - .5); }

/* ── 카드 표시 ── */
function showCard() {
  document.getElementById('rate-btns').style.display = 'none';
  if (!queue.length) { showDone(); return; }
  const c = queue[0];
  const isRep = reports.some(r => r.q === c.q);
  document.getElementById('card-area').innerHTML = `
    <div class="card-wrap">
      <div class="card-top">
        <span class="card-ata">ATA ${curChapter.num} · ${curChapter.name}</span>
        <button class="report-btn${isRep ? ' reported' : ''}" onclick="openModal()" id="rep-btn">
          ${isRep ? '신고됨' : '오류 신고'}
        </button>
      </div>
      <div onclick="flipCard()">
        <div class="card-q">${c.q}</div>
        <div class="card-hint">탭하여 모범답안 확인</div>
      </div>
      <div class="disclaimer">⚠ AI 생성 답변입니다. 공식 교재(AMM)와 함께 활용하세요.</div>
    </div>
    <p class="card-oral" style="margin-top:8px;">소리 내어 답을 말해본 뒤 확인하세요</p>`;
  flipped = false;
  updateProg();
}

function flipCard() {
  if (flipped || !queue.length) return;
  flipped = true;
  const c = queue[0];
  const isRep = reports.some(r => r.q === c.q);
  document.getElementById('card-area').innerHTML = `
    <div class="card-wrap">
      <div class="card-top">
        <span class="card-ata">ATA ${curChapter.num} · ${curChapter.name}</span>
        <button class="report-btn${isRep ? ' reported' : ''}" onclick="openModal()" id="rep-btn">
          ${isRep ? '신고됨' : '오류 신고'}
        </button>
      </div>
      <div class="card-q" style="cursor:default;">${c.q}</div>
      <div class="card-a">${c.a}</div>
      <div class="disclaimer">⚠ AI 생성 답변입니다. 공식 교재(AMM)와 함께 활용하세요.</div>
    </div>`;
  document.getElementById('rate-btns').style.display = 'flex';
}

/* ── 오류 신고 모달 ── */
function openModal() {
  if (!queue.length) return;
  pendingReport = queue[0];
  const existing = reports.find(r => r.q === pendingReport.q);
  const overlay = document.createElement('div');
  overlay.className = 'modal-bg';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <h3>오류 신고</h3>
      <p>"${pendingReport.q.substring(0, 45)}${pendingReport.q.length > 45 ? '...' : ''}"</p>
      <textarea id="report-reason" placeholder="어떤 부분이 잘못되었나요? (선택사항)">${existing ? existing.reason : ''}</textarea>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">취소</button>
        <button class="modal-submit" onclick="submitReport()">신고 제출</button>
      </div>
    </div>`;
  document.getElementById('card-area').appendChild(overlay);
}

function closeModal() {
  const o = document.getElementById('modal-overlay');
  if (o) o.remove();
  pendingReport = null;
}

function submitReport() {
  const reason = document.getElementById('report-reason').value.trim();
  const idx = reports.findIndex(r => r.q === pendingReport.q);
  const entry = {
    q: pendingReport.q, a: pendingReport.a,
    chapter: 'ATA ' + curChapter.num + ' ' + curChapter.name,
    reason: reason || '오류 내용 미기재',
    time: new Date().toLocaleString('ko-KR', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})
  };
  if (idx >= 0) reports[idx] = entry;
  else reports.push(entry);
  updateRepCount();
  closeModal();
  flipped ? flipCard_refresh() : showCard();
}

function flipCard_refresh() {
  const btn = document.getElementById('rep-btn');
  if (btn) { btn.textContent = '신고됨'; btn.classList.add('reported'); }
}

/* ── 평가 ── */
function rate(r) {
  ct[r]++;
  if (r === 'again') { const c = queue.shift(); queue.push(c); }
  else queue.shift();
  updateStats();
  showCard();
}

function updateStats() {
  document.getElementById('s-again').textContent = ct.again;
  document.getElementById('s-good').textContent = ct.good;
  document.getElementById('s-easy').textContent = ct.easy;
}

function updateProg() {
  if (!curChapter) return;
  const base = queue.length + ct.good + ct.easy;
  const done = ct.good + ct.easy;
  const pct = base ? Math.round(done / base * 100) : 0;
  document.getElementById('pf').style.width = pct + '%';
  document.getElementById('pt').textContent = done + ' / ' + base;
}

function updateRepCount() {
  document.getElementById('rep-count').textContent = reports.length > 0 ? '(' + reports.length + ')' : '';
}

/* ── 신고 목록 ── */
function renderReportList() {
  const list = document.getElementById('report-list');
  if (!reports.length) {
    list.innerHTML = '<span class="empty-report">아직 신고된 항목이 없습니다</span>';
    return;
  }
  list.innerHTML = reports.map((r, i) => `
    <div class="report-item">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div>
          <span style="font-size:10px;color:var(--text3);">${r.chapter} · ${r.time}</span>
          <div class="report-q">${r.q}</div>
          <div style="font-size:12px;color:var(--danger-text);margin-top:2px;">사유: ${r.reason}</div>
        </div>
        <button class="del-btn" onclick="deleteReport(${i})">삭제</button>
      </div>
    </div>`).join('');
}

function deleteReport(i) {
  reports.splice(i, 1);
  updateRepCount();
  renderReportList();
}

/* ── 완료 ── */
function showDone() {
  document.getElementById('card-area').innerHTML = `
    <div class="done-box">
      <h2>학습 완료!</h2>
      <p>알겠음 ${ct.good}개 · 쉬움 ${ct.easy}개 · 반복 ${ct.again}회</p>
      <button class="btn" onclick="reloadChapter()">다시 학습하기</button>
    </div>`;
}

function reloadChapter() {
  if (curChapter) { ct = {again:0, good:0, easy:0}; updateStats(); loadQuestions(curChapter); }
}

buildChips();
</script>
</body>
</html>
